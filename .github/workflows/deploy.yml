name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate static site
        run: pnpm generate

      - name: Prepare docs
        run: |
          mkdir -p docs
          cp -r .output/public/* docs/
          rm -rf docs/_nuxt/builds

      - name: Commit to main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated site"
          file_pattern: docs/*